<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ordinal GitHub Build Loader</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #050505;
      color: #ffffff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #topbar {
      min-height: 58px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      box-sizing: border-box;
      background: #0b0b0b;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      flex: 0 0 auto;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: bold;
      cursor: pointer;
      background: #ffffff;
      color: #111111;
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.14);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    #status {
      min-width: 0;
      flex: 1;
      font-size: 13px;
      opacity: 0.78;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    iframe {
      width: 100%;
      flex: 1;
      min-height: 0;
      border: 0;
      background: #000000;
    }

    @media (max-width: 700px) {
      #topbar {
        flex-wrap: wrap;
      }

      #status {
        flex-basis: 100%;
        white-space: normal;
      }

      button {
        flex: 1;
      }
    }
  </style>
</head>

<body>
  <div id="topbar">
    <button id="reload">Reload build</button>
    <button id="fullscreen" class="secondary">Full screen</button>
    <div id="status">Loading Ordinals HTML receiver...</div>
  </div>

  <iframe
    id="ordinal-frame"
    title="Ordinals HTML Receiver"
    allow="fullscreen; autoplay; clipboard-read; clipboard-write; encrypted-media; camera; microphone; geolocation; accelerometer; gyroscope"
    allowfullscreen
  ></iframe>

  <script>
    (function () {
      /*
        This is the EXISTING Ordinals HTML viewer.
        It already works when you paste HTML into it.
      */
      var RECEIVER_URL =
        "https://ordinals.com/content/33064f05445f5c4d97d6a70585e70cdabb0b52690e61d611afb2b4091aca614bi0";

      /*
        This is the file you replace in your repo.
        Put your test app here:
          /build/index.html
      */
      var BUILD_ENTRY = "./build/index.html";

      var frame = document.getElementById("ordinal-frame");
      var statusEl = document.getElementById("status");
      var reloadBtn = document.getElementById("reload");
      var fullscreenBtn = document.getElementById("fullscreen");

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function buildEntryUrl() {
        return new URL(BUILD_ENTRY, window.location.href).href;
      }

      function cacheBust(url) {
        var u = new URL(url, window.location.href);
        u.searchParams.set("t", Date.now());
        return u.href;
      }

      async function fetchBuildHtml() {
        var url = buildEntryUrl();

        setStatus("Fetching " + url);

        var response = await fetch(cacheBust(url), {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("Could not fetch /build/index.html. HTTP " + response.status);
        }

        var html = await response.text();

        if (!html.trim()) {
          throw new Error("/build/index.html is empty.");
        }

        return html;
      }

      function postHtmlToReceiver(html) {
        var payload = {
          type: "html-view:render",
          html: html
        };

        /*
          Send a few times because the iframe may still be booting.
          The receiver ignores duplicates after it document.writes anyway.
        */
        var tries = 0;

        var timer = setInterval(function () {
          tries += 1;

          try {
            frame.contentWindow.postMessage(payload, "https://ordinals.com");
          } catch (error) {
            console.error(error);
          }

          if (tries >= 20) {
            clearInterval(timer);
          }
        }, 250);
      }

      async function loadBuild() {
        try {
          setStatus("Opening Ordinals receiver...");

          frame.src = RECEIVER_URL;

          var html = await fetchBuildHtml();

          setStatus("Posting GitHub build HTML into Ordinals receiver...");

          postHtmlToReceiver(html);

          setStatus("Loaded. Replace /build/index.html, then click Reload build.");
        } catch (error) {
          console.error(error);
          setStatus(error.message || String(error));
        }
      }

      function getFullscreenElement() {
        return (
          document.fullscreenElement ||
          document.webkitFullscreenElement ||
          document.mozFullScreenElement ||
          document.msFullscreenElement
        );
      }

      function requestFullscreen(el) {
        if (el.requestFullscreen) return el.requestFullscreen();
        if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
        if (el.mozRequestFullScreen) return el.mozRequestFullScreen();
        if (el.msRequestFullscreen) return el.msRequestFullscreen();
      }

      function exitFullscreen() {
        if (document.exitFullscreen) return document.exitFullscreen();
        if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
        if (document.mozCancelFullScreen) return document.mozCancelFullScreen();
        if (document.msExitFullscreen) return document.msExitFullscreen();
      }

      async function toggleFullscreen() {
        try {
          if (getFullscreenElement()) {
            await exitFullscreen();
            fullscreenBtn.textContent = "Full screen";
          } else {
            await requestFullscreen(frame);
            fullscreenBtn.textContent = "Exit full screen";
          }
        } catch (error) {
          console.error(error);
          setStatus("Fullscreen blocked by browser.");
        }
      }

      reloadBtn.addEventListener("click", loadBuild);
      fullscreenBtn.addEventListener("click", toggleFullscreen);

      loadBuild();
    })();
  </script>
</body>
</html>
