<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Universal Ordinal HTML Receiver</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #050505;
      color: #ffffff;
      font-family: Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 760px;
      padding: 24px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      line-height: 1.1;
    }

    p {
      margin: 8px 0;
      line-height: 1.45;
      opacity: 0.86;
    }

    .small {
      margin-top: 14px;
      font-size: 12px;
      opacity: 0.65;
      word-break: break-all;
    }

    .error {
      color: #ffb4b4;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Universal Ordinal HTML Receiver</h1>
    <p id="status">Waiting for an HTTPS loader to send HTML...</p>
    <div class="small" id="source"></div>
  </div>

  <script>
    (function () {
      var statusEl = document.getElementById("status");
      var sourceEl = document.getElementById("source");

      function setStatus(message, isError) {
        statusEl.textContent = message;
        statusEl.className = isError ? "error" : "";
      }

      function escapeAttr(value) {
        return String(value || "").replace(/"/g, "&quot;");
      }

      function isAllowedOrigin(origin) {
        /*
          Open receiver mode.

          Any HTTPS website can use this receiver:
          - GitHub Pages
          - Vercel
          - Netlify
          - Cloudflare Pages
          - custom HTTPS domains

          Local files, http:// pages, and null origins are blocked.
        */

        if (!origin || origin === "null") {
          return false;
        }

        try {
          var parsed = new URL(origin);
          return parsed.protocol === "https:";
        } catch (error) {
          return false;
        }
      }

      function injectBaseTag(html, baseUrl) {
        var out = String(html || "").trim();

        if (!out) {
          throw new Error("Empty HTML payload.");
        }

        if (!baseUrl) {
          return out;
        }

        var baseHref = new URL("./", baseUrl).href;
        var baseTag = '<base href="' + escapeAttr(baseHref) + '">';

        if (/<base\s/i.test(out)) {
          out = out.replace(/<base[^>]*>/i, baseTag);
        } else if (/<head[\s>]/i.test(out)) {
          out = out.replace(/<head([^>]*)>/i, "<head$1>" + baseTag);
        } else if (/<html[\s>]/i.test(out)) {
          out = out.replace(
            /<html([^>]*)>/i,
            "<html$1><head>" + baseTag + "</head>"
          );
        } else {
          out = [
            "<!DOCTYPE html>",
            "<html>",
            "<head>",
            '<meta charset="UTF-8">',
            '<meta name="viewport" content="width=device-width, initial-scale=1.0">',
            baseTag,
            "</head>",
            "<body>",
            out,
            "</body>",
            "</html>"
          ].join("");
        }

        return out;
      }

      function rewriteRootAssetPaths(html, baseUrl) {
        /*
          Converts absolute asset paths like:
          /assets/app.js
          /style.css

          into URLs relative to the source build file.

          Best practice is still to build with relative paths:
          Vite: base: "./"
        */

        if (!baseUrl) {
          return html;
        }

        var baseHref = new URL("./", baseUrl).href;

        return html.replace(
          /\b(src|href|poster)=["']\/([^"']+)["']/gi,
          function (_, attr, path) {
            return attr + '="' + new URL(path, baseHref).href + '"';
          }
        );
      }

      function renderHtml(html, baseUrl) {
        var finalHtml = injectBaseTag(html, baseUrl);
        finalHtml = rewriteRootAssetPaths(finalHtml, baseUrl);

        document.open();
        document.write(finalHtml);
        document.close();
      }

      function handlePayload(payload, origin) {
        if (!payload || typeof payload !== "object") {
          return;
        }

        if (payload.type !== "ordinal-loader:render") {
          return;
        }

        if (typeof payload.html !== "string") {
          throw new Error("Render payload missing html string.");
        }

        sourceEl.textContent = "Source: " + (payload.baseUrl || payload.source || origin);
        setStatus("Rendering HTML inside the Ordinals receiver...");

        renderHtml(payload.html, payload.baseUrl || "");
      }

      window.addEventListener("message", function (event) {
        if (!isAllowedOrigin(event.origin)) {
          setStatus("Blocked non-HTTPS or null origin: " + event.origin, true);
          return;
        }

        try {
          handlePayload(event.data, event.origin);
        } catch (error) {
          console.error(error);
          setStatus(error.message || String(error), true);
        }
      });

      function announceReady(target) {
        try {
          if (target && target !== window) {
            target.postMessage(
              {
                type: "ordinal-loader:ready",
                href: window.location.href,
                receiver: "universal-ordinal-html-receiver",
                version: "1.0.0"
              },
              "*"
            );
          }
        } catch (error) {}
      }

      announceReady(window.parent);
      announceReady(window.opener);

      setInterval(function () {
        announceReady(window.parent);
        announceReady(window.opener);
      }, 750);
    })();
  </script>
</body>
</html>
